<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Claude Task Runner</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f7f4;
        --panel: #ffffff;
        --text: #1f2328;
        --muted: #646b75;
        --line: #d8d8d2;
        --accent: #2563eb;
        --danger: #b42318;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--text);
      }
      header {
        padding: 24px clamp(16px, 4vw, 40px) 12px;
        border-bottom: 1px solid var(--line);
      }
      h1 { margin: 0 0 6px; font-size: 24px; }
      p { margin: 0; color: var(--muted); }
      main {
        display: grid;
        gap: 20px;
        grid-template-columns: minmax(0, 1fr);
        padding: 20px clamp(16px, 4vw, 40px);
      }
      .stack { display: grid; gap: 20px; }
      section {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 16px;
      }
      h2 { margin: 0 0 14px; font-size: 18px; }
      label { display: block; margin: 12px 0 6px; font-weight: 650; }
      input, textarea, select {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 9px 10px;
        font: inherit;
        background: white;
      }
      textarea { min-height: 100px; resize: vertical; }
      .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
      .checks { display: flex; align-items: center; gap: 8px; margin-top: 12px; }
      .checks input { width: auto; }
      button {
        border: 1px solid var(--line);
        border-radius: 6px;
        background: white;
        padding: 8px 11px;
        font: inherit;
        cursor: pointer;
      }
      button.primary { background: var(--accent); color: white; border-color: var(--accent); }
      button.danger { color: var(--danger); }
      .actions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 14px; }
      .task {
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 12px;
        margin-bottom: 10px;
      }
      .task h3 { margin: 0 0 8px; font-size: 16px; }
      .meta { color: var(--muted); font-size: 13px; line-height: 1.6; }
      .pill {
        display: inline-block;
        border-radius: 999px;
        padding: 2px 8px;
        border: 1px solid var(--line);
        font-size: 12px;
        margin-left: 6px;
      }
      .pill.favorite {
        border-color: #f59e0b;
        color: #92400e;
        background: #fffbeb;
      }
      pre {
        white-space: pre-wrap;
        overflow: auto;
        max-height: 420px;
        background: #111827;
        color: #e5e7eb;
        padding: 14px;
        border-radius: 8px;
        font-size: 13px;
      }
      @media (max-width: 880px) {
        main { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Claude Task Runner</h1>
      <p>本地定时触发 Claude Code 任务。命令模板可配置，避免绑定某个 CLI 参数版本。</p>
    </header>

    <main>
      <section>
        <h2>任务列表</h2>
        <div id="tasks"></div>

        <h2 style="margin-top: 22px;">运行日志</h2>
        <div class="actions" id="logs"></div>
        <pre id="log-view">选择一个日志查看最近输出。</pre>
      </section>

      <section>
        <h2 id="form-title">新建任务</h2>
        <form id="task-form">
          <input type="hidden" id="task-id" />

          <label for="name">任务名称</label>
          <input id="name" required placeholder="夜间修复测试" />

          <label for="projectSelect">本地项目</label>
          <select id="projectSelect">
            <option value="">不绑定项目，手动填写路径</option>
          </select>

          <label for="cwd">仓库路径</label>
          <input id="cwd" required placeholder="/Users/kolar/github/project" />

          <label for="prompt">任务 Prompt</label>
          <textarea id="prompt" required placeholder="检查当前测试失败原因，修复代码，运行测试，并总结改动。"></textarea>

          <label for="commandTemplate">命令模板</label>
          <input id="commandTemplate" value='claude --print "$TASK_PROMPT" --permission-mode acceptEdits' />

          <label class="checks">
            <input id="authCheckEnabled" type="checkbox" checked />
            启动前检查 Claude Code 登录状态
          </label>

          <div class="row">
            <div>
              <label for="authCheckCommand">登录检查命令</label>
              <input id="authCheckCommand" value="claude auth status" />
            </div>
            <div>
              <label for="authTimeoutSeconds">登录步骤超时秒数</label>
              <input id="authTimeoutSeconds" type="number" min="5" value="300" />
            </div>
          </div>

          <label for="authLoginCommand">未登录时执行一次</label>
          <input id="authLoginCommand" value="claude" />

          <div class="row">
            <div>
              <label for="scheduleType">触发方式</label>
              <select id="scheduleType">
                <option value="manual">仅手动</option>
                <option value="once">一次性</option>
                <option value="daily">每天指定时间</option>
                <option value="weekly">每周指定时间</option>
                <option value="interval">间隔触发</option>
              </select>
            </div>
            <div>
              <label for="maxRuntimeMinutes">最长运行分钟</label>
              <input id="maxRuntimeMinutes" type="number" min="1" value="90" />
            </div>
          </div>

          <div id="schedule-fields"></div>

          <label class="checks">
            <input id="enabled" type="checkbox" checked />
            启用自动触发
          </label>

          <div class="actions">
            <button class="primary" type="submit">保存任务</button>
            <button type="button" id="reset-form">清空表单</button>
          </div>
        </form>
      </section>

      <section>
        <h2 id="project-form-title">本地项目</h2>
        <form id="project-form">
          <input type="hidden" id="project-id" />

          <label for="projectName">项目名称</label>
          <input id="projectName" required placeholder="my-repo" />

          <label for="projectPath">项目地址</label>
          <input id="projectPath" required placeholder="/Users/kolar/github/my-repo" />

          <label for="projectNotes">备注</label>
          <input id="projectNotes" placeholder="可选，例如主分支、用途、注意事项" />

          <label class="checks">
            <input id="projectPinned" type="checkbox" />
            固定为常用项目
          </label>

          <div class="actions">
            <button class="primary" type="submit">保存项目</button>
            <button type="button" id="reset-project-form">清空项目</button>
          </div>
        </form>
        <div id="projects" style="margin-top: 14px;"></div>
      </section>
    </main>

    <script>
      const $ = (id) => document.getElementById(id);
      let tasks = [];
      let projects = [];

      function scheduleEditor(type, schedule = {}) {
        if (type === "once") {
          return `<label for="runAt">运行时间</label><input id="runAt" type="datetime-local" value="${toLocalInput(schedule.runAt)}" />`;
        }
        if (type === "daily") {
          return `<label for="dailyTimes">每天时间，逗号分隔</label><input id="dailyTimes" placeholder="09:00, 13:30, 23:15" value="${(schedule.times || []).join(", ")}" />`;
        }
        if (type === "weekly") {
          return `
            <label for="weeklyDays">星期，0=周日，1=周一，逗号分隔</label>
            <input id="weeklyDays" placeholder="1, 3, 5" value="${(schedule.days || []).join(", ")}" />
            <label for="weeklyTimes">当天时间，逗号分隔</label>
            <input id="weeklyTimes" placeholder="10:00, 18:00" value="${(schedule.times || []).join(", ")}" />
          `;
        }
        if (type === "interval") {
          return `<label for="intervalMinutes">间隔分钟</label><input id="intervalMinutes" type="number" min="1" value="${schedule.minutes || 300}" />`;
        }
        return "";
      }

      function toLocalInput(value) {
        if (!value) return "";
        const d = new Date(value);
        if (Number.isNaN(d.getTime())) return "";
        const pad = (n) => String(n).padStart(2, "0");
        return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
      }

      function parseList(value) {
        return value.split(",").map((item) => item.trim()).filter(Boolean);
      }

      function readSchedule() {
        const type = $("scheduleType").value;
        if (type === "once") return { type, runAt: $("runAt").value ? new Date($("runAt").value).toISOString() : null };
        if (type === "daily") return { type, times: parseList($("dailyTimes").value) };
        if (type === "weekly") return { type, days: parseList($("weeklyDays").value).map(Number), times: parseList($("weeklyTimes").value) };
        if (type === "interval") return { type, minutes: Number($("intervalMinutes").value || 300) };
        return { type: "manual" };
      }

      function scheduleText(schedule) {
        if (!schedule || schedule.type === "manual") return "仅手动";
        if (schedule.type === "once") return `一次性 ${new Date(schedule.runAt).toLocaleString()}`;
        if (schedule.type === "daily") return `每天 ${schedule.times.join(", ")}`;
        if (schedule.type === "weekly") return `每周 ${schedule.days.join(", ")} / ${schedule.times.join(", ")}`;
        if (schedule.type === "interval") return `每 ${schedule.minutes} 分钟`;
        return schedule.type;
      }

      function renderScheduleFields(schedule) {
        $("schedule-fields").innerHTML = scheduleEditor($("scheduleType").value, schedule);
      }

      function renderTasks() {
        $("tasks").innerHTML = tasks.length ? tasks.map((task) => `
          <div class="task">
            <h3>${escapeHtml(task.name)}
              <span class="pill">${task.enabled ? "enabled" : "paused"}</span>
              ${task.running ? '<span class="pill">running</span>' : ""}
            </h3>
            <div class="meta">
              project: ${escapeHtml(task.projectName || projectName(task.projectId)) || "none"}<br />
              run path: ${escapeHtml(task.resolvedCwd || task.cwd)}<br />
              fallback path: ${escapeHtml(task.cwd)}<br />
              schedule: ${escapeHtml(scheduleText(task.schedule))}<br />
              next: ${task.nextRunAt ? new Date(task.nextRunAt).toLocaleString() : "none"}<br />
              last: ${task.lastStatus || "never"} ${task.lastRunAt ? new Date(task.lastRunAt).toLocaleString() : ""}
            </div>
            <div class="actions">
              <button onclick="editTask('${task.id}')">编辑</button>
              <button onclick="runTaskNow('${task.id}')">立即运行</button>
              <button onclick="toggleTask('${task.id}')">${task.enabled ? "暂停" : "启用"}</button>
              ${task.lastLog ? `<button onclick="openLog('${task.lastLog}')">查看最近日志</button>` : ""}
              <button class="danger" onclick="deleteTask('${task.id}')">删除</button>
            </div>
          </div>
        `).join("") : `<p>还没有任务。</p>`;
      }

      function projectName(projectId) {
        return projects.find((project) => project.id === projectId)?.name || "";
      }

      function renderProjectSelect(selected = "") {
        const favoriteProjects = projects.filter((project) => project.pinned);
        const otherProjects = projects.filter((project) => !project.pinned);
        const optionsFor = (items) => items.map((project) => `
          <option value="${project.id}" ${project.id === selected ? "selected" : ""}>
            ${project.pinned ? "[常用] " : ""}${escapeHtml(project.name)} - ${escapeHtml(project.path)}
          </option>
        `).join("");
        $("projectSelect").innerHTML = `
          <option value="">不绑定项目，手动填写路径</option>
          ${favoriteProjects.length ? `<optgroup label="常用项目">${optionsFor(favoriteProjects)}</optgroup>` : ""}
          ${otherProjects.length ? `<optgroup label="其他项目">${optionsFor(otherProjects)}</optgroup>` : ""}
        `;
      }

      function renderProjects() {
        $("projects").innerHTML = projects.length ? projects.map((project) => `
          <div class="task">
            <h3>${escapeHtml(project.name)}
              ${project.pinned ? '<span class="pill favorite">常用</span>' : ""}
            </h3>
            <div class="meta">
              path: ${escapeHtml(project.path)}<br />
              ${project.notes ? `notes: ${escapeHtml(project.notes)}<br />` : ""}
            </div>
            <div class="actions">
              <button onclick="editProject('${project.id}')">编辑</button>
              <button onclick="useProject('${project.id}')">用于新任务</button>
              <button onclick="toggleProjectPin('${project.id}')">${project.pinned ? "取消常用" : "固定常用"}</button>
              <button class="danger" onclick="deleteProject('${project.id}')">删除</button>
            </div>
          </div>
        `).join("") : `<p>还没有项目。先添加一个 repo 地址，任务里就能直接选择。</p>`;
        renderProjectSelect($("projectSelect").value);
      }

      function escapeHtml(value) {
        return String(value || "").replace(/[&<>"']/g, (ch) => ({
          "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;"
        }[ch]));
      }

      async function load() {
        const [taskData, projectData] = await Promise.all([
          fetch("/api/tasks").then((r) => r.json()),
          fetch("/api/projects").then((r) => r.json())
        ]);
        tasks = taskData.tasks;
        projects = projectData.projects;
        renderProjects();
        renderTasks();
        loadLogs();
      }

      async function loadLogs() {
        const data = await fetch("/api/logs").then((r) => r.json());
        $("logs").innerHTML = data.logs.slice(0, 12).map((log) =>
          `<button onclick="openLog('${log.file}')">${log.file}</button>`
        ).join("") || "<p>暂无日志。</p>";
      }

      async function openLog(file) {
        $("log-view").textContent = await fetch(`/api/logs/${encodeURIComponent(file)}`).then((r) => r.text());
      }

      function editTask(id) {
        const task = tasks.find((item) => item.id === id);
        if (!task) return;
        $("form-title").textContent = "编辑任务";
        $("task-id").value = task.id;
        $("name").value = task.name;
        renderProjectSelect(task.projectId || "");
        $("cwd").value = task.cwd;
        $("prompt").value = task.prompt;
        $("commandTemplate").value = task.commandTemplate;
        $("authCheckEnabled").checked = task.authCheckEnabled !== false;
        $("authCheckCommand").value = task.authCheckCommand || "claude auth status";
        $("authLoginCommand").value = task.authLoginCommand || "claude";
        $("authTimeoutSeconds").value = task.authTimeoutSeconds || 300;
        $("enabled").checked = task.enabled;
        $("maxRuntimeMinutes").value = task.maxRuntimeMinutes;
        $("scheduleType").value = task.schedule?.type || "manual";
        renderScheduleFields(task.schedule || { type: "manual" });
      }

      function editProject(id) {
        const project = projects.find((item) => item.id === id);
        if (!project) return;
        $("project-form-title").textContent = "编辑项目";
        $("project-id").value = project.id;
        $("projectName").value = project.name;
        $("projectPath").value = project.path;
        $("projectNotes").value = project.notes || "";
        $("projectPinned").checked = Boolean(project.pinned);
      }

      function useProject(id) {
        const project = projects.find((item) => item.id === id);
        if (!project) return;
        $("projectSelect").value = project.id;
        $("cwd").value = project.path;
      }

      async function deleteProject(id) {
        if (!confirm("删除这个项目？绑定到它的任务会变成手动路径。")) return;
        await fetch(`/api/projects/${id}`, { method: "DELETE" });
        load();
      }

      async function toggleProjectPin(id) {
        const project = projects.find((item) => item.id === id);
        if (!project) return;
        await fetch(`/api/projects/${id}/pin`, {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({ pinned: !project.pinned })
        });
        load();
      }

      async function runTaskNow(id) {
        await fetch(`/api/tasks/${id}/run`, { method: "POST" });
        setTimeout(load, 600);
      }

      async function toggleTask(id) {
        const task = tasks.find((item) => item.id === id);
        await fetch(`/api/tasks/${id}`, {
          method: "PUT",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({ ...task, enabled: !task.enabled })
        });
        load();
      }

      async function deleteTask(id) {
        if (!confirm("删除这个任务？")) return;
        await fetch(`/api/tasks/${id}`, { method: "DELETE" });
        load();
      }

      $("scheduleType").addEventListener("change", () => renderScheduleFields({ type: $("scheduleType").value }));
      $("projectSelect").addEventListener("change", () => {
        const project = projects.find((item) => item.id === $("projectSelect").value);
        if (project) $("cwd").value = project.path;
      });

      $("reset-project-form").addEventListener("click", () => {
        $("project-form").reset();
        $("project-id").value = "";
        $("project-form-title").textContent = "本地项目";
      });

      $("reset-form").addEventListener("click", () => {
        $("task-form").reset();
        $("task-id").value = "";
        $("form-title").textContent = "新建任务";
        renderProjectSelect("");
        renderScheduleFields({ type: "manual" });
      });

      $("project-form").addEventListener("submit", async (event) => {
        event.preventDefault();
        const id = $("project-id").value;
        const payload = {
          name: $("projectName").value,
          path: $("projectPath").value,
          notes: $("projectNotes").value,
          pinned: $("projectPinned").checked
        };
        await fetch(id ? `/api/projects/${id}` : "/api/projects", {
          method: id ? "PUT" : "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify(payload)
        });
        $("reset-project-form").click();
        load();
      });

      $("task-form").addEventListener("submit", async (event) => {
        event.preventDefault();
        const id = $("task-id").value;
        const payload = {
          name: $("name").value,
          projectId: $("projectSelect").value,
          cwd: $("cwd").value,
          prompt: $("prompt").value,
          commandTemplate: $("commandTemplate").value,
          authCheckEnabled: $("authCheckEnabled").checked,
          authCheckCommand: $("authCheckCommand").value,
          authLoginCommand: $("authLoginCommand").value,
          authTimeoutSeconds: Number($("authTimeoutSeconds").value || 300),
          enabled: $("enabled").checked,
          maxRuntimeMinutes: Number($("maxRuntimeMinutes").value || 90),
          schedule: readSchedule()
        };
        await fetch(id ? `/api/tasks/${id}` : "/api/tasks", {
          method: id ? "PUT" : "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify(payload)
        });
        $("reset-form").click();
        load();
      });

      renderScheduleFields({ type: "manual" });
      load();
      setInterval(load, 10_000);
    </script>
  </body>
</html>
